graphrag:
  chunk_overlap: 100
  chunk_size: 300
  chunk_strategy: tokens
  embedding_model: text-embedding-ada-002
  max_tokens: 16384
  model: gpt-4o-mini
  temperature: 0
integration:
  clustering_before_leiden: true
  merge_similar_communities: true
  preserve_cluster_info: true
  use_kggen_clustering: true
kggen:
  clustering_threshold: 0.85
  context: 토마토, 고추, 파프리카 등 작물의 생장과 식물 질병, 그리고 정부의 작물 생장을 위한 기술지원 및 문제해결 과정에 초점을 맞춘
    한국 농업 문서를 다룬다.
  dedup_temperature: 0
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  min_cluster_size: 2
output:
  format: parquet
  save_intermediate: true
  visualization: true
pipeline:
  created_at: '2025-12-14T23:58:25.324174'
  name: SNU-KG Unified Pipeline
  version: '1.0'
